<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>會計分錄練習工具 - 規格檢核版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        .drop-zone.drag-over { border: 2px dashed #3b82f6; background-color: #eff6ff; }
        .journal-font { font-family: "微軟正黑體", "Times New Roman", serif; }
        summary::-webkit-details-marker { display: none; }
        .focus-area:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); border-style: solid; }
        #sidebar-container { max-height: 85vh; overflow-y: auto; }
        .sortable-ghost { opacity: 0.3; background-color: #cbd5e1; }
        .calc-item { cursor: move; transition: all 0.2s; position: relative; }
        .calc-item:hover { border-left: 3px solid #6366f1; background-color: #f8fafc; }
        .subject-item {
            background-color: white; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); cursor: move; font-size: 14px; transition: border-color 0.2s;
        }
        .subject-item:hover { border-color: #6366f1; }
        @keyframes modalShow {
            from { opacity: 0; transform: scale(0.9) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-animate { animation: modalShow 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-100 p-4 journal-font">

    <div id="custom-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 no-export">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-6 modal-animate border">
            <div class="text-center mb-4">
                <span class="text-3xl">📝</span>
                <h3 class="text-lg font-bold text-slate-700 mt-2">新增計算備註</h3>
            </div>
            <textarea id="modal-input" class="w-full p-3 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-300 transition-all text-sm mb-4" rows="3"></textarea>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 transition">取消</button>
                <button onclick="confirmModal()" class="flex-1 py-3 rounded-2xl bg-indigo-500 text-white font-bold shadow-lg">確定</button>
            </div>
        </div>
    </div>

    <div id="export-content" class="max-w-7xl mx-auto">
        <div id="problem-area" tabindex="0" class="focus-area mb-6 bg-white p-4 rounded-xl shadow-sm border-2 border-dashed border-slate-300 outline-none no-export">
            <h2 class="text-sm font-bold text-slate-400 mb-2">📸 貼上題目截圖 (Ctrl+V)</h2>
            <div id="image-placeholder" class="py-6 text-center text-slate-300 italic text-xs font-bold">點擊此處並貼上圖片</div>
            <div id="image-preview" class="flex justify-center"></div>
            <button id="clear-img" class="hidden mt-2 text-xs text-red-400 hover:underline no-export font-bold">移除圖片</button>
        </div>

        <header class="text-center mb-6 no-export">
            <h1 class="text-3xl font-bold text-slate-800">會計分錄練習工具</h1>
            <div class="mt-4 flex flex-col items-center gap-3">
                <div class="inline-flex items-center gap-3 bg-white p-3 rounded-lg shadow-sm border">
                    <select id="year" class="outline-none border-b border-slate-300 font-bold bg-transparent">
                        <option value="">年</option><option value="X0">X0</option><option value="X1">X1</option><option value="X2">X2</option><option value="X3">X3</option><option value="X4">X4</option><option value="X5">X5</option><option value="X6">X6</option><option value="X7">X7</option><option value="X8">X8</option><option value="X9">X9</option>
                    </select>
                    <div id="date-input-container" class="inline-flex items-center gap-2">
                        <div id="mode-md" class="flex items-center gap-2">
                            <select id="month" class="outline-none border-b border-slate-300 font-bold bg-transparent"><option value="">月</option></select>
                            <select id="day" class="outline-none border-b border-slate-300 font-bold bg-transparent"><option value="">日</option></select>
                        </div>
                        <div id="mode-quarter" class="hidden flex items-center gap-2">
                            <select id="quarter" class="outline-none border-b border-slate-300 font-bold bg-transparent">
                                <option value="">季</option><option value="1">第1季</option><option value="2">第2季</option><option value="3">第3季</option><option value="4">第4季</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="toggleDateMode()" class="no-export p-1 px-2 bg-slate-50 rounded text-[10px] font-bold border transition-all">🔄</button>
                </div>
            </div>
        </header>

        <div class="flex flex-col md:flex-row gap-6 items-start">
            <div id="sidebar-container" class="w-full md:w-1/4 flex flex-col gap-4 no-export">
                <div class="bg-white p-4 rounded-lg shadow border">
                    <h2 class="font-bold border-b mb-3 pb-2 text-slate-700 text-sm">🆕 科目管理</h2>
                    <input type="text" id="custom-subject-name" placeholder="科目名稱" class="w-full border-b p-1 text-sm outline-none mb-3 font-bold">
                    <select id="custom-subject-type" class="w-full border-b p-1 text-sm outline-none bg-transparent mb-3 font-bold">
                        <option value="assets">1. 資產</option><option value="liabilities">2. 負債</option><option value="equity">3. 權益</option><option value="revenue">4. 收益</option><option value="expenses">5. 費損</option>
                    </select>
                    <div class="flex gap-2">
                        <button onclick="addSubjectToLibrary()" class="flex-1 bg-indigo-500 text-white text-[10px] py-2 rounded-lg font-bold">加入庫</button>
                        <button onclick="createTemporarySubject()" class="flex-1 bg-slate-100 text-slate-500 text-[10px] py-2 rounded-lg font-bold">臨時</button>
                    </div>
                    <div id="temp-subject-container" class="mt-2 border-t pt-2 hidden"><div id="temp-pool" class="flex flex-wrap gap-2"></div></div>
                </div>

                <div class="bg-white p-4 rounded-lg shadow border">
                    <h2 class="font-bold border-b mb-3 pb-2 text-slate-700 text-sm">📂 科目搜尋</h2>
                    <input type="text" id="subject-search" oninput="filterSubjects()" placeholder="🔍 搜尋..." class="w-full p-2 text-sm border rounded-full bg-slate-50 outline-none mb-4">
                    <div id="library-lists" class="space-y-2 text-sm font-bold">
                        <details class="group cat-section" id="cat-assets" open><summary class="p-2 bg-blue-50 text-blue-800 rounded-lg cursor-pointer">1. 資產類</summary><div class="p-2 flex flex-wrap gap-2 list-container"><div class="subject-item" draggable="true" ondragstart="drag(event)">現金</div><div class="subject-item" draggable="true" ondragstart="drag(event)">銀行存款</div><div class="subject-item" draggable="true" ondragstart="drag(event)">應收帳款</div><div class="subject-item" draggable="true" ondragstart="drag(event)">存貨</div><div class="subject-item" draggable="true" ondragstart="drag(event)">機器設備</div><div class="subject-item" draggable="true" ondragstart="drag(event)">累計折舊</div></div></details>
                        <details class="group cat-section" id="cat-liabilities"><summary class="p-2 bg-red-50 text-red-800 rounded-lg cursor-pointer">2. 負債類</summary><div class="p-2 flex flex-wrap gap-2 list-container"><div class="subject-item" draggable="true" ondragstart="drag(event)">應付帳款</div><div class="subject-item" draggable="true" ondragstart="drag(event)">應付票據</div></div></details>
                        <details class="group cat-section" id="cat-equity"><summary class="p-2 bg-purple-50 text-purple-800 rounded-lg cursor-pointer">3. 權益類</summary><div class="p-2 flex flex-wrap gap-2 list-container"><div class="subject-item" draggable="true" ondragstart="drag(event)">普通股股本</div><div class="subject-item" draggable="true" ondragstart="drag(event)">保留盈餘</div></div></details>
                        <details class="group cat-section" id="cat-revenue"><summary class="p-2 bg-green-50 text-green-800 rounded-lg cursor-pointer">4. 收益類</summary><div class="p-2 flex flex-wrap gap-2 list-container"><div class="subject-item" draggable="true" ondragstart="drag(event)">銷貨收入</div></div></details>
                        <details class="group cat-section" id="cat-expenses"><summary class="p-2 bg-orange-50 text-orange-800 rounded-lg cursor-pointer">5. 費損類</summary><div class="p-2 flex flex-wrap gap-2 list-container"><div class="subject-item" draggable="true" ondragstart="drag(event)">銷貨成本</div><div class="subject-item" draggable="true" ondragstart="drag(event)">折舊費用</div><div class="subject-item" draggable="true" ondragstart="drag(event)">薪資支出</div></div></details>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-3/4 flex flex-col gap-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div id="debit-zone" class="drop-zone bg-white p-6 rounded-2xl shadow-sm border min-h-[300px]" ondrop="drop(event, '借方')" ondragover="allowDrop(event)">
                        <h2 class="font-bold text-blue-600 border-b mb-4 pb-2 italic text-lg">Debit 借方</h2><ul id="debit-list" class="space-y-4 font-bold"></ul>
                    </div>
                    <div id="credit-zone" class="drop-zone bg-white p-6 rounded-2xl shadow-sm border min-h-[300px]" ondrop="drop(event, '貸方')" ondragover="allowDrop(event)">
                        <h2 class="font-bold text-red-600 border-b mb-4 pb-2 italic text-lg text-right">Credit 貸方</h2><ul id="credit-list" class="space-y-4 font-bold"></ul>
                    </div>
                </div>
                <div id="balance-check" class="bg-white p-4 rounded-2xl shadow-sm border flex items-center justify-between no-export border-l-8 border-slate-300">
                    <div class="flex gap-8 text-sm font-bold text-slate-500">
                        <div>借：<span id="sum-debit" class="text-blue-600 font-mono text-xl">0</span></div>
                        <div>貸：<span id="sum-credit" class="text-red-600 font-mono text-xl">0</span></div>
                    </div>
                    <div id="balance-status" class="font-bold text-slate-400">差額：0</div>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border no-export">
                    <textarea id="manual-calc" rows="2" class="w-full p-2 text-sm border-none outline-none font-mono font-bold" placeholder="📝 輸入大批計算過程，生成後點擊 ＋ 可隨時補充..."></textarea>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-4 my-10 no-export">
            <label class="inline-flex items-center cursor-pointer font-bold"><input type="checkbox" id="show-calc" class="form-checkbox h-4 w-4 text-indigo-600 rounded" checked><span class="ml-2 text-sm text-slate-600">包含詳細計算公式</span></label>
            <div class="flex gap-4">
                <button onclick="generateJournal()" class="bg-indigo-600 text-white px-10 py-4 rounded-full font-bold shadow-lg">＋ 生成分錄紀錄</button>
                <button onclick="downloadPDF()" class="bg-emerald-600 text-white px-8 py-4 rounded-full font-bold shadow-lg">📥 下載 PDF</button>
                <button onclick="clearAll()" class="bg-slate-300 text-slate-700 px-8 py-4 rounded-full font-bold">重置</button>
            </div>
        </div>
        <div id="result-area" class="hidden max-w-4xl mx-auto mb-20"><div id="journal-history" class="space-y-8"></div></div>
    </div>

    <script>
        const formatter = new Intl.NumberFormat('en-US');
        let clipboardData = null, clipboardFormula = null, currentJournalBtn = null, dateMode = 'md';

        const mS = document.getElementById('month'), dS = document.getElementById('day');
        for (let i = 1; i <= 12; i++) mS.innerHTML += `<option value="${i}">${i}</option>`;
        for (let i = 1; i <= 31; i++) dS.innerHTML += `<option value="${i}">${i}</option>`;
        new Sortable(document.getElementById('journal-history'), { animation: 150 });

        function handleAmountLogic(input, event) {
            if (event.type === 'dblclick' && input.value) {
                clipboardData = input.value; clipboardFormula = input.dataset.formula || null;
                input.classList.add('bg-blue-100'); setTimeout(() => input.classList.remove('bg-blue-100'), 400);
            }
            if (event.type === 'click' && clipboardData && !input.value) {
                input.value = clipboardData; if(clipboardFormula) input.dataset.formula = clipboardFormula;
                clipboardData = null; clipboardFormula = null; updateBalance();
            }
            if (event.type === 'keydown' && event.key === 'Enter') {
                let v = input.value.trim();
                if (v.startsWith('=')) {
                    try { const res = new Function('return ' + v.substring(1))(); input.dataset.formula = v.substring(1); input.value = formatter.format(res); } catch(e) { alert("公式錯誤"); }
                } else { input.value = formatter.format(v.replace(/,/g, '')); delete input.dataset.formula; }
                updateBalance();
            }
        }

        function filterSubjects() {
            const query = document.getElementById('subject-search').value.toLowerCase();
            document.querySelectorAll('.cat-section').forEach(cat => {
                let matched = false;
                cat.querySelectorAll('.subject-item').forEach(item => {
                    const isMatch = item.innerText.toLowerCase().includes(query);
                    item.style.display = isMatch ? 'block' : 'none';
                    if (isMatch) matched = true;
                });
                if (query !== "") cat.open = matched;
            });
        }

        function generateJournal() {
            const y = document.getElementById('year').value, m = document.getElementById('month').value, d = document.getElementById('day').value, q = document.getElementById('quarter').value;
            const showCalc = document.getElementById('show-calc').checked, manualLines = document.getElementById('manual-calc').value.trim().split('\n').filter(l => l.trim());
            const dItems = document.querySelectorAll('#debit-list li'), cItems = document.querySelectorAll('#credit-list li');
            if (dItems.length === 0 && cItems.length === 0) return;

            document.getElementById('result-area').classList.remove('hidden');
            const block = document.createElement('div'); block.className = "journal-block bg-white p-8 rounded-3xl shadow-sm border-l-8 border-indigo-500 relative mb-8 font-bold";
            
            let html = `<button onclick="this.parentElement.remove()" class="absolute top-6 right-6 text-slate-200 hover:text-red-500 no-export">✕</button>`;
            html += `<div class="mb-4 border-b pb-2 no-export flex gap-2 items-center text-indigo-900 font-bold">
                <select class="bg-transparent outline-none">${[...document.getElementById('year').options].map(o=>`<option value="${o.value}" ${o.value==y?'selected':''}>${o.text}</option>`).join('')}</select>
                ${dateMode=='md' ? `<select class="bg-transparent outline-none">${[...document.getElementById('month').options].map(o=>`<option value="${o.value}" ${o.value==m?'selected':''}>${o.text}</option>`).join('')}</select>月<select class="bg-transparent outline-none">${[...document.getElementById('day').options].map(o=>`<option value="${o.value}" ${o.value==d?'selected':''}>${o.text}</option>`).join('')}</select>日` : `<select class="bg-transparent outline-none">${[...document.getElementById('quarter').options].map(o=>`<option value="${o.value}" ${o.value==q?'selected':''}>${o.text}</option>`).join('')}</select>季`}</div>`;
            const dateStr = dateMode === 'md' ? `${y}年${m}月${d}日` : `${y}年第${q}季`;
            html += `<div class="hidden print-date text-indigo-900 font-bold mb-4 border-b pb-2 text-lg underline underline-offset-8 italic">${dateStr}</div><ul>`;
            
            const process = (items, side) => items.forEach(item => {
                const name = item.querySelector('.subject-name').innerText, val = item.querySelector('.amount-input').value || "0";
                html += `<li class="flex justify-between w-full py-1 text-lg group font-bold"><div class="${side==='貸方'?'pl-12':''} w-1/2 cursor-pointer" onclick="this.innerText=prompt('修改科目',this.innerText)||this.innerText">${side==='貸方'?'　':''}${name}</div><div class="w-1/4 text-right cursor-pointer" onclick="this.innerText=formatter.format(prompt('金額',this.innerText).replace(/,/g,''))">${side==='借方'?val:''}</div><div class="w-1/4 text-right cursor-pointer" onclick="this.innerText=formatter.format(prompt('金額',this.innerText).replace(/,/g,''))">${side==='貸方'?val:''}</div><button onclick="this.parentElement.remove()" class="no-export text-xs text-red-100 opacity-0 group-hover:opacity-100 ml-2">✕</button></li>`;
            });
            process(dItems, '借方'); process(cItems, '貸方');
            html += `</ul><div class="flex gap-2 mt-2 no-export"><button onclick="addManualItem('借方', this)" class="text-[10px] text-blue-400 border border-blue-50 px-2 py-0.5 rounded">＋借方</button><button onclick="addManualItem('貸方', this)" class="text-[10px] text-red-400 border border-red-100 px-2 py-0.5 rounded">＋貸方</button></div>`;
            
            // 💡 補上標題與燈泡圖案
            html += `<div class="mt-6 pt-2 border-t border-dashed border-slate-200">
                        <div class="text-sm text-slate-700 font-bold mb-2 flex items-center gap-1">💡 計算過程：</div>
                        <div class="calc-container space-y-1">`;
            manualLines.forEach(l => { 
                html += `<div class="calc-item py-2 px-3 rounded-xl bg-slate-50 flex justify-between items-center group font-bold text-slate-700 border border-slate-100"><span>${l}</span><button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 no-export">✕</button></div>`; 
            });
            if (showCalc) {
                document.querySelectorAll('#debit-list li, #credit-list li').forEach(i => {
                    const inp = i.querySelector('.amount-input');
                    if (inp.dataset.formula) html += `<div class="calc-item py-2 px-3 rounded-xl bg-indigo-50 flex justify-between items-center group font-bold text-indigo-700 border border-indigo-100"><span>${i.querySelector('.subject-name').innerText}: ${inp.dataset.formula.replace(/\d{4,}/g, n=>formatter.format(n))} = ${inp.value}</span><button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 no-export">✕</button></div>`;
                });
            }
            html += `</div><button onclick="openModal(this)" class="mt-4 text-xs text-indigo-400 border-2 border-indigo-50 border-dashed w-full py-2 rounded-xl hover:bg-indigo-50 no-export font-bold">＋ 增加備註內容</button></div>`;
            
            block.innerHTML = html; document.getElementById('journal-history').appendChild(block);
            new Sortable(block.querySelector('.calc-container'), { animation: 150 });
            document.getElementById('debit-list').innerHTML = ''; document.getElementById('credit-list').innerHTML = ''; document.getElementById('manual-calc').value = ''; updateBalance();
        }

        // --- 彈窗與輔助函數 ---
        function openModal(btn) { currentJournalBtn = btn; document.getElementById('custom-modal').classList.remove('hidden'); document.getElementById('modal-input').focus(); }
        function closeModal() { document.getElementById('custom-modal').classList.add('hidden'); }
        function confirmModal() {
            const txt = document.getElementById('modal-input').value.trim();
            if (txt && currentJournalBtn) {
                const con = currentJournalBtn.parentElement.querySelector('.calc-container'), div = document.createElement('div');
                div.className = "calc-item py-2 px-3 mb-1 rounded-xl bg-slate-50 flex justify-between items-center group font-bold text-slate-700 border border-slate-100";
                div.innerHTML = `<span>${txt}</span><button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 no-export">✕</button>`;
                con.appendChild(div); closeModal();
            }
        }
        function addManualItem(side, btn) {
            const name = prompt(`科目：`), amount = prompt(`金額：`);
            if (name && amount) {
                const li = document.createElement('li'); li.className = "flex justify-between w-full py-1 text-lg group font-bold";
                const fmt = formatter.format(amount.replace(/,/g, ''));
                li.innerHTML = `<div class="${side==='貸方'?'pl-12':''} w-1/2 cursor-pointer" onclick="this.innerText=prompt('修改科目',this.innerText)||this.innerText">${side==='貸方'?'　':''}${name}</div><div class="w-1/4 text-right cursor-pointer" onclick="this.innerText=formatter.format(prompt('金額',this.innerText).replace(/,/g,''))">${side==='借方'?fmt:''}</div><div class="w-1/4 text-right cursor-pointer" onclick="this.innerText=formatter.format(prompt('金額',this.innerText).replace(/,/g,''))">${side==='貸方'?fmt:''}</div><button onclick="this.parentElement.remove()" class="no-export text-xs text-red-100 opacity-0 group-hover:opacity-100 ml-2">✕</button>`;
                btn.parentElement.parentElement.querySelector('ul').appendChild(li);
            }
        }
        function addSubjectToLibrary() {
            const name = document.getElementById('custom-subject-name').value.trim(), type = document.getElementById('custom-subject-type').value;
            if (name) { const div = document.createElement('div'); div.className = "subject-item"; div.draggable = true; div.innerText = name; div.ondragstart = drag; document.querySelector(`#cat-${type} .list-container`).appendChild(div); document.getElementById('custom-subject-name').value = ""; }
        }
        function createTemporarySubject() {
            const name = document.getElementById('custom-subject-name').value.trim();
            if (name) { document.getElementById('temp-subject-container').classList.remove('hidden'); const div = document.createElement('div'); div.className = "subject-item bg-indigo-50 border border-indigo-100 px-2 py-1 rounded font-bold"; div.draggable = true; div.innerText = name; div.ondragstart = drag; document.getElementById('temp-pool').appendChild(div); document.getElementById('custom-subject-name').value = ""; }
        }
        function updateBalance() {
            const getS = (id) => { let t = 0; document.querySelectorAll(`#${id} .amount-input`).forEach(i => { const n = parseFloat(i.value.replace(/,/g, '')); if (!isNaN(n)) t += n; }); return t; };
            const d = getS('debit-list'), c = getS('credit-list'), diff = Math.abs(d - c);
            document.getElementById('sum-debit').innerText = formatter.format(d); document.getElementById('sum-credit').innerText = formatter.format(c);
            const status = document.getElementById('balance-status'), bar = document.getElementById('balance-check');
            if (diff === 0 && d !== 0) { status.innerText = "已平衡 ✅"; status.className = "text-emerald-600 font-bold"; bar.style.borderLeftColor = "#10b981"; }
            else { status.innerText = `差額：${formatter.format(diff)}`; status.className = "text-red-500 font-bold"; bar.style.borderLeftColor = (diff === 0) ? "#cbd5e1" : "#ef4444"; }
        }
        function drag(e) { e.dataTransfer.setData("text", e.target.innerText); }
        function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function drop(ev, side) {
            ev.preventDefault(); ev.currentTarget.classList.remove('drag-over');
            const data = ev.dataTransfer.getData("text"), list = document.getElementById(side === '借方' ? 'debit-list' : 'credit-list'), li = document.createElement("li");
            li.className = "flex items-center justify-between bg-slate-50 border p-3 rounded-xl shadow-sm";
            li.innerHTML = `<span class="subject-name font-bold text-slate-700 text-sm font-bold">${data}</span>
                <div class="flex items-center gap-2"><input type="text" oninput="updateBalance()" onkeydown="handleAmountLogic(this, event)" ondblclick="handleAmountLogic(this, event)" onclick="handleAmountLogic(this, event)"
                class="amount-input w-44 border-b border-slate-300 outline-none text-right px-1 bg-transparent font-mono text-lg cursor-pointer" placeholder="金額/公式"><button onclick="this.parentElement.parentElement.remove(); updateBalance();" class="text-slate-300 hover:text-red-500 ml-2 no-export font-bold">✕</button></div>`;
            list.appendChild(li);
        }
        async function downloadPDF() {
            document.querySelectorAll('.journal-block').forEach(b => { b.querySelector('.no-export').style.display = 'none'; b.querySelector('.print-date').classList.remove('hidden'); b.querySelectorAll('.flex.gap-2.mt-2.no-export').forEach(e=>e.style.display='none'); });
            const hide = [document.getElementById('custom-modal'), document.getElementById('sidebar-container'), document.querySelector('header'), ...document.querySelectorAll('.no-export'), ...document.querySelectorAll('button'), ...document.querySelectorAll('select')];
            hide.forEach(el => { if(el) el.style.display = 'none'; });
            const canvas = await html2canvas(document.getElementById('export-content'), { scale: 2 });
            const doc = new jspdf.jsPDF('p', 'mm', 'a4');
            doc.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
            doc.save("解題筆記.pdf"); location.reload();
        }
        function clearAll() { if(confirm("清除？")) location.reload(); }
        document.getElementById('problem-area').addEventListener('paste', e => {
            const item = Array.from(e.clipboardData.items).find(i => i.type.includes('image'));
            if (item) {
                const reader = new FileReader();
                reader.onload = ev => { document.getElementById('image-preview').innerHTML = `<img src="${ev.target.result}" class="max-h-[500px] rounded-2xl shadow-lg border">`; document.getElementById('image-placeholder').classList.add('hidden'); document.getElementById('clear-img').classList.remove('hidden'); };
                reader.readAsDataURL(item.getAsFile());
            }
        });
    </script>
</body>
</html>
